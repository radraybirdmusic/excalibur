<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCALIBUR // HUD v1.25</title>
    <style>
        :root { --neon-green: #00ff41; --dark-green: #003b00; --warning-amber: #ffb000; --terminal-black: #050505; --admin-blue: #0088ff; }
        body { background: var(--terminal-black); color: var(--neon-green); font-family: 'Courier New', monospace; padding: 15px; line-height: 1.4; }
        #hud-container { max-width: 650px; margin: 0 auto; border: 2px solid var(--neon-green); padding: 15px; }
        
        .label { color: var(--warning-amber); font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .data-section { border: 1px solid var(--dark-green); padding: 12px; margin-bottom: 15px; background: rgba(0, 59, 0, 0.1); }
        
        /* Admin Console */
        #admin-console { display: none; border: 2px solid var(--admin-blue); background: rgba(0, 20, 40, 0.9); padding: 10px; margin-bottom: 15px; }
        .admin-label { color: var(--admin-blue); font-size: 0.7em; font-weight: bold; }
        
        /* The Cherry-Pick Grid */
        .node-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; margin: 10px 0; }
        .node-btn { border: 1px solid var(--neon-green); color: var(--neon-green); background: transparent; padding: 5px; cursor: pointer; font-size: 0.7em; transition: 0.2s; }
        .node-btn.selected { background: var(--neon-green); color: black; font-weight: bold; box-shadow: 0 0 10px var(--neon-green); }
        
        textarea, select { width: 100%; background: #111; color: #fff; border: 1px solid var(--dark-green); padding: 10px; font-family: monospace; box-sizing: border-box; }
        .action-btn { width: 100%; background: var(--neon-green); color: black; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        #inbox-list { list-style: none; padding: 0; font-size: 0.85em; color: #fff; max-height: 300px; overflow-y: auto; }
        #inbox-list li { border-bottom: 1px solid var(--dark-green); padding: 8px 0; }
        .monitor-trace { border-left: 2px solid var(--admin-blue); padding-left: 10px !important; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

<div id="hud-container">
    <div id="admin-console">
        <div class="admin-label">MASTER OVERRIDE // ROUND CONTROL</div>
        <select id="round-select" onchange="updateGlobalRound()" style="margin-top:5px;">
            <option value="1">ROUND 1</option><option value="2">ROUND 2</option>
            <option value="3">ROUND 3</option><option value="4">ROUND 4</option>
            <option value="5">ROUND 5</option>
        </select>
        <button onclick="purgeLogs()" style="background:#400; color:#f44; border:1px solid #f44; width:100%; margin-top:10px; font-size:0.7em; padding:5px;">[ PURGE BIN HISTORY ]</button>
    </div>

    <div class="data-section">
        <div class="label">Nodal Frequency // <span id="player-role">--</span></div>
        <div id="system-status">SYNCING RIPPLE...</div>
    </div>

    <div class="data-section" style="border-color: var(--warning-amber);">
        <div class="label" style="color: var(--warning-amber);">Archive Ledger</div>
        <ul id="inbox-list"><li>Connecting...</li></ul>
    </div>

    <div class="data-section">
        <div class="label">Multi-Relay // Cherry-Pick Targets</div>
        <div class="node-selector" id="target-grid"></div>
        <textarea id="msg-input" rows="2" placeholder="Input performance cue..."></textarea>
        <button class="action-btn" id="send-btn" onclick="shootToBin()">[ EXECUTE MULTI-SHOT ]</button>
    </div>
</div>

<script>
    const BIN_ID = "69df3b3e856a682189369836";
    const API_KEY = "$2a$10$Py08gG/gZ3q3jcSUOXcVruxQ8/PsjObMgTZg7oEJdGkL7ZTh5rFPq";
    const params = new URLSearchParams(window.location.search);
    const myNodeID = params.get('node') || "01";
    const isAdmin = (myNodeID === "03");
    let selectedNodes = [];

    if (isAdmin) document.getElementById('admin-console').style.display = 'block';

    // Build the grid - Multi-select enabled for EVERYONE
    const grid = document.getElementById('target-grid');
    for (let i = 1; i <= 15; i++) {
        let id = i.toString().padStart(2, '0');
        if (id === myNodeID) continue;
        let btn = document.createElement('button');
        btn.className = 'node-btn';
        btn.id = `node-${id}`;
        btn.innerText = "NODE_" + id;
        btn.onclick = () => {
            if (selectedNodes.includes(id)) {
                selectedNodes = selectedNodes.filter(n => n !== id);
                btn.classList.remove('selected');
            } else {
                selectedNodes.push(id);
                btn.classList.add('selected');
            }
        };
        grid.appendChild(btn);
    }

    async function updateHUD() {
        try {
            const resBin = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?nocache=${Date.now()}`, {
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await resBin.json();
            const messages = data.record.messages || [];
            const currentRound = data.record.config?.round || 1;

            if (isAdmin) document.getElementById('round-select').value = currentRound;

            const resMan = await fetch(`./manifest.json?t=${Date.now()}`);
            const manData = await resMan.json();
            document.getElementById('player-role').innerText = manData.assignments[myNodeID][0];

            const inbox = document.getElementById('inbox-list');
            let html = "";
            [...messages].reverse().forEach(pkg => {
                const targets = pkg.to.split(',');
                if (targets.includes(myNodeID)) {
                    html += `<li><span style="color:var(--warning-amber)">[FROM_${pkg.from}]</span> ${pkg.msg}</li>`;
                } else if (pkg.from === myNodeID) {
                    html += `<li><span style="color:#0088ff">[SENT_TO_${pkg.to}]</span> ${pkg.msg}</li>`;
                } else if (isAdmin) {
                    html += `<li class="monitor-trace"><span style="color:var(--admin-blue)">[TRACE: ${pkg.from}->${pkg.to}]</span> ${pkg.msg}</li>`;
                }
            });
            inbox.innerHTML = html || "<li>No packets found.</li>";
            document.getElementById('system-status').innerText = `STABLE // ROUND ${currentRound}`;
        } catch (e) { document.getElementById('system-status').innerText = "RIPPLE_SYNC_ERR"; }
    }

    async function shootToBin() {
        const msg = document.getElementById('msg-input').value;
        if (selectedNodes.length === 0 || !msg) return;

        try {
            const resGet = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const data = await resGet.json();
            let msgList = data.record.messages || [];
            
            msgList.push({ from: myNodeID, to: selectedNodes.join(','), msg: msg });
            if (msgList.length > 50) msgList = msgList.slice(-50);

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ ...data.record, messages: msgList })
            });

            document.getElementById('msg-input').value = "";
            selectedNodes = [];
            document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('selected'));
            updateHUD();
        } catch (e) { alert("SHOT_FAILED"); }
    }

    async function updateGlobalRound() {
        const newRound = document.getElementById('round-select').value;
        try {
            const resGet = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const data = await resGet.json();
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ ...data.record, config: { round: newRound } })
            });
            updateHUD();
        } catch (e) { alert("ERROR"); }
    }

    async function purgeLogs() {
        if (!confirm("Wipe archive?")) return;
        try {
            const resGet = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const data = await resGet.json();
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ ...data.record, messages: [] })
            });
            updateHUD();
        } catch (e) { alert("ERROR"); }
    }

    updateHUD();
    setInterval(updateHUD, 15000);
</script>
</body>
</html>
