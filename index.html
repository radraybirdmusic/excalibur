<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCALIBUR // HUD v1.02b</title>
    <style>
        /* Nodal Engine Visual Profile */
        body {
            background-color: #050505;
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        #hud-container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .header {
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .label { 
            color: #555; 
            font-size: 0.75em; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        #system-status {
            font-weight: bold;
            font-size: 0.9em;
        }

        h2 { margin: 10px 0; text-transform: uppercase; letter-spacing: 3px; }

        .motive-box {
            background: rgba(0, 255, 65, 0.05);
            padding: 15px;
            border-left: 3px solid #00ff41;
            margin: 20px 0;
        }

        /* The Quest Ledger Reveal Style */
        #quest-ledger {
            display: none; /* Controlled by hud.js */
            margin-top: 30px;
            border: 1px double #ff0000;
            padding: 15px;
            background: rgba(255, 0, 0, 0.05);
            color: #ff4444;
        }

        #quest-list ul {
            list-style-type: " > ";
            padding-left: 20px;
        }

        /* The Glitch Flicker */
        .glitch-animate {
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { border-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
            50% { border-color: #550000; box-shadow: 0 0 20px #ff0000; }
            100% { border-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
        }

        .broadcast-msg {
            background: #00ff41;
            color: #000;
            padding: 5px 10px;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div id="hud-container">
    <div class="header">
        <div class="label">Archive Connection</div>
        <div id="system-status">INITIALIZING v1.02b...</div>
    </div>

    <div class="identity-section">
        <div class="label">Node ID Assigned</div>
        <h2 id="player-role">--</h2>
        <p id="player-bio">Awaiting spectral handshake...</p>
    </div>

    <div class="motive-box">
        <div class="label">Active Motives</div>
        <ul id="motive-list">
            <li>Synchronizing with round schedule...</li>
        </ul>
    </div>

    <div id="quest-ledger">
        <div class="label" style="color: #ff4444;">Restored Chronicle Data</div>
        <div id="quest-list">
            </div>
    </div>

    <div id="notification-area" class="broadcast-msg"></div>
</div>

<script>
    async function updateHUD() {
        console.log("Nodal Sync Initialized...");
        try {
            // Hard-coded data to force a display
            const data = {
                "system_status": "OVR // SIGNAL_ESTABLISHED",
                "assignments": { "01": ["NODE_MARSHALL"] },
                "library": { "NODE_MARSHALL": { "bio": "THE INLINE SCRIPT IS ACTIVE. THE EXTERNAL HUD.JS WAS THE PROBLEM." } },
                "round_schedule": { "1": { "NODE_MARSHALL": { "motives": ["Handshake Successful."] } } }
            };

            const nodeName = data.assignments["01"][0];
            const nodeBase = data.library[nodeName];
            const schedule = data.round_schedule["1"][nodeName];

            document.getElementById('player-role').innerText = nodeName.replace('NODE_', '');
            document.getElementById('player-bio').innerText = nodeBase.bio;
            document.getElementById('system-status').innerText = data.system_status;
            
            let motiveHTML = "";
            schedule.motives.forEach(m => { motiveHTML += `<li>${m}</li>`; });
            document.getElementById('motive-list').innerHTML = motiveHTML;

        } catch (e) {
            document.getElementById('system-status').innerText = "INLINE SCRIPT ERROR";
        }
    }
    updateHUD();
</script>

</html>
