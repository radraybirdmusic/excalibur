<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let nodes = [];
let currentNodeID = 1; 
let totalNodes = 15;

function preload() {
  // Load images 01-15 from the root
  for (let i = 1; i <= totalNodes; i++) {
    let nodeNum = nf(i, 2); 
    nodes[i] = loadImage('node_' + nodeNum + '.png');
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont('monospace');
}

function draw() {
  background(5, 10, 15);
  
  // Outer Border
  stroke(0, 255, 255, 100);
  strokeWeight(2);
  noFill();
  rect(10, 10, width-20, height-20);
  
  // Header
  fill(0, 255, 255);
  noStroke();
  textSize(24);
  textAlign(LEFT);
  text("NODE: " + nf(currentNodeID, 2), 30, 60);

  // --- THE IMAGE (The only new thing) ---
  if (nodes[currentNodeID]) {
    imageMode(CENTER);
    // Keep it sized to fit the iPhone width comfortably
    let imgSize = width * 0.7;
    image(nodes[currentNodeID], width/2, height * 0.4, imgSize, imgSize);
  }

  // Footer / Instructions
  textAlign(CENTER);
  textSize(14);
  fill(0, 255, 255, 150);
  text("TAP SCREEN TO CYCLE NODES", width/2, height - 40);
}

function touchStarted() {
  // Original simple cycling logic
  currentNodeID++;
  if (currentNodeID > totalNodes) {
    currentNodeID = 1;
  }
  return false; 
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
